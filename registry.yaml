  browse:
    description: AI-first headless browser automation with @ref element selection, SSO/MFA login handoff, persistent sessions
    capabilities:
    - navigate web pages
    - interact with elements via @ref snapshots
    - fill forms, click buttons, upload files
    - SSO/MFA login via headed browser with automatic handoff to headless
    - persistent session save/load with cookies, browser storage, and IndexedDB injected at context creation when available
    - capture API traffic and generate reusable curl skills
    - extract text, HTML, attributes from elements
    - read browser clipboard contents after clicking UI copy buttons
    - credential management via OS keychain
    - tab management (new, switch, close, list)
    - vision-powered element finding and page description
    - autonomous goal execution and page exploration
    commands:
      open: 'Navigate to URL: open <url>'
      snapshot: 'Get page structure with @refs: snapshot [-i] [-c] [--csv] [--md]'
      click: 'Click element: click <@ref>'
      fill: 'Clear and fill input: fill <@ref> <text>'
      type: 'Append text: type <@ref> <text>'
      press: 'Press key: press <key>'
      get: 'Read data: get text|value|attr|title|url <@ref>'
      clipboard: 'Browser clipboard: clipboard read|copy|paste'
      wait: 'Wait for condition: wait <ms|selector|--text|--stable>'
      login: 'SSO/MFA auth: login <url> opens headed browser; login done [--save <name>] transfers auth to headless; login
        status; login cancel'
      session: 'Persistent auth: session save|load|list|delete|export|import <name>'
      capture: 'API traffic capture: capture start|stop <name>|status'
      api: 'Replay captured API: api <name> <function>|list|show|test|delete'
      auth: 'Credentials: auth check-creds|store-creds|login|get-creds <domain>'
      tab: 'Tab management: tab list|new|close|<n>'
      viewport: 'Set viewport size: viewport <width> <height>'
      screenshot: 'Capture screenshot: screenshot [path] [--full]'
      vision: 'AI vision: vision describe|find|click|analyze|explain|compare'
      agent: 'Autonomous: agent goal|explore|explain|recover'
    examples:
    - intent: open a website
      command: agent-browse open https://example.com
    - intent: get interactive elements
      command: agent-browse snapshot -i
    - intent: click a button
      command: agent-browse click @e3
    - intent: fill in a form field
      command: agent-browse fill @e5 'hello world'
    - intent: login with SSO
      command: agent-browse login https://app.example.com
    - intent: finish SSO login and save session
      command: agent-browse login done --save mysite
    - intent: restore a saved session
      command: agent-browse session load mysite
    - intent: capture API traffic
      command: agent-browse capture start
    - intent: wait for page to load
      command: agent-browse wait --stable
    - intent: read the copied value from the page
      command: agent-browse clipboard read
    routing:
      discover_keywords:
      - browser automation
      - playwright
      - puppeteer
      - selenium
      - web scraping
      - screenshot website
      - capture api traffic
      prompt_patterns:
      - \bplaywright\b
      - \bpuppeteer\b
      - \bselenium\b
      - \bweb\s+(scrape|scraping|automation)\b
      - \bbrowser automation\b
      - \bopen\b.*\b(website|web|page|url)\b
      recommended_entrypoints:
      - agent-do browse open https://example.com
      - agent-do browse snapshot -i
      - agent-do browse screenshot /tmp/page.png
      default_command: open
      raw_cli_equivalents:
      - pattern: \bnpx\s+playwright\b
        replacement: agent-do browse
        example: agent-do browse open https://example.com
        reason: agent-do browse is purpose-built for AI browser automation with snapshots and persistent sessions
      - pattern: \bplaywright\b
        replacement: agent-do browse
        example: agent-do browse snapshot -i
        reason: agent-do browse gives Claude structured page state instead of raw test tooling
      - pattern: \bpuppeteer\b
        replacement: agent-do browse
        example: agent-do browse open https://example.com
        reason: agent-do browse keeps browser state and interactions in an agent-friendly CLI
      - pattern: \bselenium\b
        replacement: agent-do browse
        example: agent-do browse open https://example.com
        reason: agent-do browse is the repo-native browser automation path
      project_signals:
      - frontend
      - e2e
      - web
      - browser
      readiness:
        check: agent-do browse status
        fix: agent-do browse install
        note: Playwright browser binaries may need installation before first use
    concurrency: mixed
