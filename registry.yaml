      interrupts: 'Show current interrupts: interrupts [--mark-seen] [--limit <n>]'
      focus: 'Manage focus: focus set|show|clear'
      claims: List advisory claims
      claim: 'Claim a file/path: claim <path> [--reason <text>] [--strength soft|strong]'
      release: 'Release a claim you own: release <path>'
      need: 'Manage dependencies: need add|list|clear'
      publishes: List published artifacts
      publish: 'Manage published artifacts: publish add|clear'
    examples:
    - intent: see who I am in this project
      command: agent-coord whoami
    - intent: refresh my coordination presence
      command: agent-coord touch
    - intent: declare what I am working on
      command: agent-coord focus set "private Render networking" --path recognition-oracle/render.yaml --path dm-ck/render.yaml
    - intent: claim a file to avoid overlap
      command: agent-coord claim recognition-oracle/render.yaml --reason "private Render blueprint wiring"
    - intent: declare that I am waiting on a package
      command: agent-coord need add dm-sdk@1.2.2 --why "switch off tarball dependency"
    - intent: publish something another agent may care about
      command: agent-coord publish add dm-sdk@1.2.2 --status ready --summary "private package published"
    - intent: see whether anything should interrupt me
      command: agent-coord interrupts
    routing:
      discover_keywords:
      - coordinate with another agent
      - agent coordination
      - tmux sessions
      - agent conflict
      - dependency between agents
      - claim file ownership
      prompt_patterns:
      - \bcoordinate\b.*\bagent\b
      - \banother agent\b
      - \bother agent\b
      - \breview .*agent\b
      - \bdo not conflict\b
      - \bseparate tmux sessions?\b
      - \bclaim\b.*\b(file|path|work)\b
      recommended_entrypoints:
      - agent-do coord status
      - agent-do coord interrupts
