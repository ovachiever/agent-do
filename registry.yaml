    - intent: run df -h on server1
      command: agent-ssh exec server1 'df -h'
    concurrency: write
  android:
    description: Control Android Emulator
    capabilities:
    - tap/swipe gestures
    - take screenshots
    - install/launch apps
    - send intents
    commands:
      tap: Tap at coordinates
      screenshot: Capture emulator screen
      launch: Launch an app
      install: Install APK
      shell: Run adb shell command
    examples:
    - intent: screenshot the Android emulator
      command: agent-android screenshot
    - intent: launch Chrome on Android
      command: agent-android launch com.android.chrome
    routing:
      discover_keywords:
      - android emulator
      - adb
      - android screenshot
      - android app
      - avd
      prompt_patterns:
      - \bandroid\s+(emulator|device|app)\b
      - \badb\b
      - \bavd\b
      - \bscreenshot\b.*\bandroid\b
      recommended_entrypoints:
      - agent-do android screenshot
      - agent-do android launch com.android.chrome
      - agent-do android shell getprop
      default_command: screenshot
      raw_cli_equivalents:
      - pattern: \badb\s+shell\b
        replacement: agent-do android shell
        example: agent-do android shell getprop
        reason: agent-do keeps Android shell access inside the same emulator tool surface
      - pattern: \badb\s+install\b
        replacement: agent-do android install
        example: agent-do android install app.apk
        reason: agent-do wraps common ADB install flows behind a stable command
      - pattern: \badb\s+logcat\b
        replacement: agent-do android shell
        example: agent-do android shell logcat
        reason: agent-do can run device shell commands without dropping to raw adb
      - pattern: \bemulator\b
        replacement: agent-do android
        example: agent-do android screenshot
        reason: agent-do exposes the common emulator actions directly
      project_signals:
      - android
      - mobile
      - emulator
      readiness:
        check: agent-do android screenshot
        fix: agent-do android screenshot
        note: Requires Android SDK emulator tooling and a running device for most commands
    concurrency: mixed
  db:
    description: Control database clients
    capabilities:
    - connect to databases
    - run queries
    - export data
    - manage schemas
    commands:
      connect: Connect to database
