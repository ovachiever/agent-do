    concurrency: mixed
  docker:
    description: Control Docker containers
    capabilities:
    - list/start/stop containers
    - view logs
    - execute commands
    - manage compose stacks
    commands:
      ps: List containers
      logs: View container logs
      exec: Run command in container
      shell: Interactive shell
      start: Start container
      stop: Stop container
      compose: Docker compose operations
    examples:
    - intent: show running containers
      command: agent-docker ps
    - intent: view logs for postgres container
      command: agent-docker logs postgres
    - intent: run bash in my-container
      command: agent-docker shell my-container
    routing:
      discover_keywords:
      - docker
      - container logs
      - docker compose
      - docker exec
      - running containers
      prompt_patterns:
      - \bdocker\b
      - \bcontainers?\b.*\b(logs|start|stop|exec)\b
      - \bdocker compose\b
      recommended_entrypoints:
      - agent-do docker ps
      - agent-do docker logs <container>
      - agent-do docker compose
      default_command: ps
      raw_cli_equivalents:
      - pattern: \bdocker\s+ps\b
        replacement: agent-do docker ps
        example: agent-do docker ps
        reason: agent-do returns a stable container listing without raw CLI parsing
      - pattern: \bdocker\s+logs\b
        replacement: agent-do docker logs
        example: agent-do docker logs <container>
        reason: agent-do keeps log access in the same structured tool surface
      - pattern: \bdocker\s+exec\b
        replacement: agent-do docker exec
        example: agent-do docker exec <container> <cmd>
        reason: agent-do preserves container execution behind one consistent interface
      - pattern: \bdocker\s+compose\b
        replacement: agent-do docker compose
        example: agent-do docker compose ps
        reason: agent-do avoids switching back to raw Docker compose syntax
      project_signals:
      - docker
      - containers
      - infra
      readiness:
        check: agent-do docker ps
        fix: agent-do docker ps
        note: Docker Desktop or the Docker daemon must be running
    concurrency: write
  ide:
