tools:
  context:
    description: Knowledge library — fetch, index, and serve external reference docs. Complementary to zpc (experience journal).
    capabilities:
    - fetch documentation from any URL, llms.txt, or GitHub repo
    - search across all indexed content with FTS5 BM25 + trust-tier ranking
    - index local project files and Claude skills
    - token-aware context budgeting for agents (knapsack packing)
    - persistent annotations and feedback-influenced search ranking
    - build and validate private content packages
    - multi-source registry with trust-tier resolution
    - global storage at ~/.agent-do/context/ (per-user, not per-project)
    commands:
      search: Search across all indexed content
      get: 'Fetch doc/skill by ID: get <id> [--file F] [--full]'
      list: 'List available packages: list [--source S] [--tags T]'
      fetch: 'Fetch markdown from URL: fetch <url>'
      fetch-llms: 'Fetch llms.txt from domain: fetch-llms <domain>'
      fetch-repo: 'Fetch docs from GitHub: fetch-repo <owner/repo> [path]'
      scan-local: 'Index project files: scan-local [path]'
      scan-skills: Index ~/.claude/skills/
      sources: List configured content sources
      add-source: 'Register a source: add-source <name> <url|path>'
      remove-source: 'Unregister a source: remove-source <name>'
      cache: 'Cache management: cache [list|clear|pin|stats]'
      annotate: 'Attach note: annotate <id> <note>'
      feedback: 'Rate a package: feedback <id> up|down'
      budget: 'Best content within token limit: budget <tokens> <query>'
      inject: 'Context blob for agents: inject [--max-tokens N]'
      build: 'Package content directory: build <dir> [-o output]'
      validate: 'Check frontmatter + structure: validate <dir>'
      status: Sources, cache stats, index freshness
      init: Initialize ~/.agent-do/context/
    examples:
    - intent: fetch stripe documentation
      command: agent-context fetch-llms stripe.com
    - intent: search for authentication docs
      command: agent-context search authentication
    - intent: get the supabase docs
      command: agent-context get supabase-llms
    - intent: what docs do I have
      command: agent-context list
    - intent: give me 4000 tokens of react context
      command: agent-context budget 4000 react
    - intent: index my claude skills
      command: agent-context scan-skills
    - intent: fetch docs from a github repo
      command: agent-context fetch-repo vercel/next.js docs/README.md
    - intent: add a note to a doc
      command: agent-context annotate stripe-llms 'Use idempotency keys for POST'
    routing:
      discover_keywords:
      - docs
      - documentation
      - llms.txt
      - reference docs
      - knowledge library
      - indexed content
      prompt_patterns:
      - \bdocs?\b
      - \bdocumentation\b
      - \bllms\.txt\b
      - \breference docs?\b
      - \bknowledge library\b
      recommended_entrypoints:
      - agent-do context search authentication
      - agent-do context fetch-llms stripe.com
      - agent-do context status
      default_command: search
      project_signals:
      - docs
      - knowledge
      readiness:
        check: agent-do context status
        fix: agent-do context init
        note: Global context storage may need initialization
    concurrency: read
  creds:
    description: Secure credential storage and resolution for agent-do tools
    capabilities:
    - store secrets in the OS secure credential store
    - resolve tool credentials from env vars or secure storage
    - check which credentials a tool needs
    - export resolved credentials for debugging
    - list and delete stored secrets
    commands:
      store: 'Store a secret: store <KEY> [VALUE] [--stdin]'
      get: 'Show secret status: get <KEY> [--reveal|--source]'
      delete: 'Delete a secret: delete <KEY>'
      list: List stored secret keys
      check: 'Check secrets: check <KEY...> | --tool <tool>'
      required: 'Show declared tool credentials: required <tool>'
      export: 'Print export lines: export <KEY...> | --tool <tool>'
      platform: Show detected secure-store backend
    examples:
    - intent: store a render API key securely
      command: agent-creds store RENDER_API_KEY --stdin
    - intent: check what namecheap needs
      command: agent-creds required namecheap
    - intent: verify vercel credentials
      command: agent-creds check --tool vercel
    routing:
      discover_keywords:
      - credentials
      - api key
      - access token
      - secret key
      - env var
      - keychain
      prompt_patterns:
      - \bcredentials?\b
      - \bapi key\b
      - \baccess token\b
      - \bsecret key\b
      - \bkeychain\b
      recommended_entrypoints:
      - agent-do creds check --tool <tool>
      - agent-do creds required <tool>
      - agent-do creds store <ENV_VAR> --stdin
      default_command: check
      raw_cli_equivalents:
      - pattern: \bsecurity\s+add-generic-password\b
        replacement: agent-do creds
        example: agent-do creds store RENDER_API_KEY --stdin
        reason: agent-do creds uses the same secure store without requiring raw keychain commands
      - pattern: \bexport\s+[A-Z0-9_]*(TOKEN|API_KEY|SECRET|ACCESS_TOKEN)=
        replacement: agent-do creds
        example: agent-do creds store RENDER_API_KEY --stdin
        reason: agent-do creds keeps secrets out of shell history and centralizes resolution
    concurrency: read
  auth:
    description: Site-level authentication orchestration over encrypted session bundles, browser import, and secure credentials
    capabilities:
    - create site auth profiles with validation rules and strategy ladders
    - reuse saved authenticated browser state before trying fresh login
    - import cookies and storage from a real authenticated browser profile
    - drive provider-aware site login with secrets resolved from env or agent-do creds
    - handle GitHub and Google login shapes before falling back to generic form fill
    - resolve TOTP secrets from agent-do creds when login flows require one-time codes
    - consume provider backup codes from secure storage when recovery-code branches appear
    - wait for mailbox-delivered verification codes or magic links through agent-do email
    - wait for SMS-delivered verification codes or magic links through agent-do sms
    - validate whether saved authenticated state is still usable
    - inspect the live auth branch and classify checkpoints before retrying
    - return next-step auth guidance for agents
    - reuse upstream GitHub or Google auth to complete SSO into another site
    - inherit upstream GitHub or Google TOTP and backup-code config when a provider-backed site hits those checkpoints
    - step through provider account choosers and consent screens with persisted checkpoint metadata
    - surface passkey or security-key checkpoints as explicit action-required states
    - open a real system browser for anti-bot or remote human-visible login flows, then import validated state back into auth storage
    commands:
      init: 'Initialize a site profile: init <site> [--domain D] [--login-url URL] [--provider generic|github|google] [--email-code|--magic-link|--sms-code|--sms-link]'
      list: 'List configured auth profiles: list'
      show: 'Show one auth profile: show <site>'
      status: 'Show auth state: status <site> [--name default]'
      probe: 'Inspect the current auth checkpoint branch: probe <site> [--load]'
      advance: 'Advance one safe checkpoint step and re-probe, preferring visible in-browser alternate methods: advance <site> [--action ACTION] [--timeout 60]'
      ensure: 'Run the strategy ladder: ensure <site> [--strategy saved-session|browser-import|site-creds|provider-refresh|interactive] [--timeout 180]'
      save: 'Save current authenticated browser state: save <site> [--name default]'
      load: 'Load saved browser auth state: load <site> [--name default]'
      import-browser: 'Import cookies and browser storage from a real browser: import-browser <site> [--browser comet] [--domain .example.com] (cookies, local/session storage, and best-effort IndexedDB)'
      clear: 'Clear saved auth state: clear <site> [--all]'
      validate: 'Validate signed-in state: validate <site>'
      instructions: 'Next-step guidance: instructions <site>'
    examples:
    - intent: create a github auth profile
      command: agent-auth init github
    - intent: create a github sso profile for another site
      command: agent-auth init widgethub --domain app.example.com --provider github
    - intent: reuse saved github auth
      command: agent-auth ensure github
    - intent: reuse github auth to sign into another app
      command: agent-auth ensure widgethub --strategy provider-refresh
    - intent: open the real browser for a cloudflare login and import the authenticated state
      command: agent-auth ensure cloudflare --strategy interactive --timeout 300
    - intent: initialize a site that sends email verification codes
      command: agent-auth init widgethub --domain app.example.com --email-code --email-from WidgetHub --email-subject "verification code" --email-account Work --email-mailbox Inbox
    - intent: initialize a site that texts verification codes
      command: agent-auth init widgethub --domain app.example.com --sms-code --sms-from WidgetHub --sms-contains "verification"
    - intent: log into github with saved creds and totp
      command: agent-auth ensure github --strategy site-creds
    - intent: log into google with saved creds and totp
      command: agent-auth ensure google --strategy site-creds
    - intent: import cookies from comet for github
      command: agent-auth import-browser github --browser comet --domain .github.com
    - intent: check if we are still signed in
      command: agent-auth validate github
    - intent: inspect auth state for a site
      command: agent-auth status github
    - intent: inspect the current auth checkpoint
      command: agent-auth probe github
    - intent: advance a live auth checkpoint
      command: agent-auth advance github
    routing:
      discover_keywords:
      - auth session
      - login state
      - auth checkpoint
      - auth advance
      - passkey prompt
      - recovery code
      - backup code
      - device approval
      - approve sign in
      - choose an account
      - consent screen
      - signed in
      - sso reuse
      - browser cookies
      - github auth
      - google auth
      prompt_patterns:
      - \blog into this site\b
      - \b(auth|login) checkpoint\b
      - \badvance (the )?(auth|login)\b
      - \bpasskey\b
      - \bcheck your phone\b
      - \bchoose an account\b
      - \bconsent screen\b
      - \breuse .* auth\b
      - \b(load|reuse) the saved .* session\b
      - \bcheck if (we|i) (am|are) signed in\b
      - \bimport cookies from\b
      - \bsso\b
      recommended_entrypoints:
      - agent-do auth ensure <site>
      - agent-do auth probe <site>
      - agent-do auth advance <site>
      - agent-do auth status <site>
      - agent-do auth validate <site>
      default_command: list
      project_signals:
      - auth
      - login
      - sso
      - oauth
      - identity
    concurrency: mixed
  spec:
    description: Repo-local specifications and change artifacts for intended behavior, change deltas, and archive readiness
    capabilities:
    - initialize repo-local spec storage under agent-do-spec/
    - create structured change packages with proposal, design, tasks, and deltas
    - list canonical specs, active changes, and archived changes
    - show one spec or one change package in human or JSON form
    - derive change status from repo files instead of hidden state
    commands:
      init: 'Initialize storage: init [--force]'
      list: 'List specs or changes: list [--specs|--changes|--archived]'
      show: 'Show one spec or change: show <name> [--type spec|change]'
      new: 'Create a change package: new <change-id> [--title T] [--spec S]'
      status: 'Summarize progress: status [--change <id>]'
    examples:
    - intent: initialize repo-local specs
      command: agent-spec init
    - intent: create a new change proposal
      command: agent-spec new add-oauth-device-flow --spec auth
    - intent: show what changes exist
      command: agent-spec list --changes
    - intent: inspect one change package
      command: agent-spec show add-oauth-device-flow --type change
    - intent: see what artifacts are missing before implementation
      command: agent-spec status --change add-oauth-device-flow
    routing:
      discover_keywords:
      - change proposal
      - behavior spec
      - spec package
      - change delta
      - archive readiness
      - implementation artifacts
      prompt_patterns:
      - \bwrite a spec\b
      - \bspec (this|that|the) (feature|change)\b
      - \bchange proposal\b
      - \bpropose this change\b
      - \bartifacts? (are )?missing before implementation\b
      - \barchive this completed change\b
      recommended_entrypoints:
      - agent-do spec list
      - agent-do spec new <change-id>
      - agent-do spec status --change <change-id>
      default_command: list
      project_signals:
      - spec
      - planning
      - docs
    concurrency: mixed
  zpc:
    description: Experience journal — structured lessons, decisions, patterns per project. Complementary to context (knowledge
      library).
    capabilities:
    - capture structured lessons (context/problem/solution/takeaway)
    - log architectural decisions with options, rationale, confidence
    - consolidate lessons into patterns via harvest
    - inject memory context into AI agents
    - search and query memory by tag, date, or text
    - git history review for post-sprint lesson extraction
    - swarm checkpoints for multi-agent phase boundary compliance
    - lesson promotion (local → team → global)
    - per-project storage at .zpc/ (not global)
    commands:
      learn: Capture a structured lesson
      decide: Log a decision with rationale
      decide-batch: Batch-log decisions from planning phase
      harvest: Post-build consolidation scan
      query: Search lessons, decisions, patterns
      patterns: View and score patterns
      review: Post-sprint lesson extraction from git history
      promote: Promote lessons to team or global
      inject: Emit agent context blob
      init: Initialize .zpc/ in a project
      status: Memory snapshot with health check
      checkpoint: Swarm phase boundary check
      profile: View/update project profile
    examples:
    - intent: log a lesson about mypy
      command: agent-zpc learn 'type checking' 'mypy missed Optional' 'added strict mode' 'always use --strict' --tags mypy,typing
    - intent: what decisions have we made
      command: agent-zpc query --type decisions
    - intent: batch log planning decisions
      command: echo 'Color | oklch dark | perceptual' | agent-zpc decide-batch --tags design
    - intent: check swarm phase boundary
      command: agent-zpc checkpoint --phase 'Phase 2' --agents 'agent-a,agent-b'
    - intent: review sprint and extract lessons from git
      command: agent-zpc review --since HEAD~20 --dry-run
    - intent: auto-extract lessons from recent work
      command: agent-zpc review --auto --phase 'Sprint 3'
    - intent: consolidate after swarm build
      command: agent-zpc harvest
    - intent: check memory status
      command: agent-zpc status
    - intent: search for docker lessons
      command: agent-zpc query --tag docker
    - intent: set up zpc in this project
      command: agent-zpc init
    routing:
      discover_keywords:
      - zpc
      - project memory
      - lessons learned
      - decisions log
      - patterns
      - experience journal
      prompt_patterns:
      - \bzpc\b
      - \bproject memory\b
      - \blessons?\s+(log|capture|record)\b
      - \bdecisions?\s+(log|record|track)\b
      - \bpatterns?\s+(harvest|extract|consolidat)\w*\b
      - \.zpc\b
      recommended_entrypoints:
      - agent-do zpc status
      - agent-do zpc patterns
      - agent-do zpc init
      default_command: status
      project_signals:
      - zpc
      - memory
      - lessons
      readiness:
        check: agent-do zpc status
        fix: agent-do zpc init
        note: ZPC is project-local and may need initialization in this repo
    concurrency: mixed
  tui:
    description: Control any terminal/TUI application via tmux
    capabilities:
    - spawn terminal applications
    - send keystrokes
    - capture screen state
    - wait for text/patterns
    commands:
      spawn: Start a new TUI session
      snapshot: Capture current screen
      send: Send keys to session
      type: Type text into session
      wait: Wait for condition
      kill: Kill a session
      list: List active sessions
    examples:
    - intent: start htop
      command: agent-tui spawn htop
    - intent: take a screenshot of session 1
      command: agent-tui snapshot 1
    - intent: send q to htop
      command: agent-tui send 1 q
    concurrency: mixed
  ios:
    description: Control iOS Simulator
    capabilities:
    - tap/swipe gestures
    - take screenshots
    - install/launch apps
    - get UI hierarchy
    commands:
      tap: 'Tap at coordinates: tap <x> <y>'
      screenshot: 'Capture simulator screen: screenshot [path] (saves to path or /tmp/ios-screenshot.png)'
      launch: 'Launch an app: launch <bundle-id>'
      tree: Get UI element tree
      swipe: 'Swipe gesture: swipe <x1> <y1> <x2> <y2>'
      type: 'Type text: type <text>'
      boot: 'Boot simulator: boot [device-name]'
      shutdown: 'Shutdown simulator: shutdown [device-name]'
      list: List available simulators
      status: Show booted simulator status
    examples:
    - intent: screenshot the iPhone simulator
      command: agent-ios screenshot
    - intent: take a screenshot and save to Downloads
      command: agent-ios screenshot ~/Downloads/screenshot.png
    - intent: save iOS screenshot to /tmp/test.png
      command: agent-ios screenshot /tmp/test.png
    - intent: tap at 100, 200
      command: agent-ios tap 100 200
    - intent: launch Safari
      command: agent-ios launch com.apple.mobilesafari
    - intent: boot the simulator
      command: agent-ios boot
    - intent: boot iPhone 15 Pro
      command: agent-ios boot 'iPhone 15 Pro'
    - intent: shutdown the simulator
      command: agent-ios shutdown
    routing:
      discover_keywords:
      - ios simulator
      - iphone simulator
      - ipad simulator
      - simctl
      - xcode simulator
      prompt_patterns:
      - \b(ios|iphone|ipad)\s+(sim|simulator)\b
      - \bsimctl\b
      - \bxcrun\s+simctl\b
      - \bscreenshot\b.*\b(ios|iphone|ipad|simulator)\b
      recommended_entrypoints:
      - agent-do ios screenshot
      - agent-do ios status
      - agent-do ios tree
      default_command: screenshot
      raw_cli_equivalents:
      - pattern: \bxcrun\s+simctl\b.*\b(io|screenshot)\b
        replacement: agent-do ios screenshot
        example: agent-do ios screenshot
        reason: Structured simulator capture is easier for Claude to inspect and reuse
      - pattern: \bxcrun\s+simctl\b.*\bboot\b
        replacement: agent-do ios boot
        example: agent-do ios boot
        reason: agent-do wraps simulator lifecycle with a stable CLI contract
      - pattern: \bxcrun\s+simctl\b
        replacement: agent-do ios
        example: agent-do ios status
        reason: agent-do exposes the common simulator actions without raw simctl syntax
      project_signals:
      - ios
      - mobile
      - xcode
      readiness:
        check: agent-do ios status
        fix: agent-do ios status
        note: Requires Xcode Simulator tooling and a booted simulator for some commands
    concurrency: mixed
  macos:
    description: Control native macOS desktop applications via accessibility APIs
    capabilities:
    - click buttons and UI elements
    - type text into fields
    - read UI element tree
    - navigate menus
    commands:
      click: Click an element
      type: Type text
      tree: Get UI hierarchy
      find: Find elements
      focus: Focus an application
      menu: Navigate menus
    examples:
    - intent: click the Save button in Photoshop
      command: agent-macos click Photoshop --title Save
    - intent: type hello into the search field
      command: agent-macos type --role textfield hello
    - intent: get the UI tree of Finder
      command: agent-macos tree Finder
    routing:
      discover_keywords:
      - macos automation
      - desktop automation
      - osascript
      - accessibility
      - native app ui
      prompt_patterns:
      - \b(macos|mac\s*os)\s+(automation|app)\b
      - \bdesktop automation\b
      - \bosascript\b
      - \bui element\b
      - \bmenu item\b
      recommended_entrypoints:
      - agent-do macos tree Finder
      - agent-do macos focus Finder
      - agent-do macos find Finder Save
      default_command: tree
      raw_cli_equivalents:
      - pattern: \bosascript\b
        replacement: agent-do macos
        example: agent-do macos tree Finder
        reason: agent-do exposes structured desktop snapshots instead of opaque AppleScript output
      - pattern: \bautomator\b
        replacement: agent-do macos
        example: agent-do macos tree Finder
        reason: agent-do is purpose-built for agent-friendly macOS automation
      project_signals:
      - desktop
      - macos
      - native
      readiness:
        check: agent-do macos permissions
        fix: agent-do macos permissions
        note: Accessibility permission is required for desktop automation
    concurrency: mixed
  repl:
    description: Control interactive REPLs (Python, Node, psql, etc.)
    capabilities:
    - spawn REPL sessions
    - send commands
    - read output
    - detect prompts
    commands:
      spawn: Start a REPL
      send: Send command to REPL
      read: Read REPL output
      list: List active REPLs
      kill: Kill a REPL session
