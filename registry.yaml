  coord:
    description: Project-local agent state and interrupt broker
    capabilities:
    - derive stable agent identities per tmux/thread session
    - renew short-lived presence leases and classify peers as active, idle, or stale
    - declare current focus areas with goal plus project-relative paths
    - manage advisory claims on files or paths
    - declare dependencies on artifacts another agent may produce
    - publish finished artifacts and compute contention, dependency, and novelty interrupts
    commands:
      touch: Renew current agent presence lease and report active peers
      whoami: Show current coordination identity and broker root
      alias: 'Assign a friendly alias: alias <name>'
